<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#F3E5AB" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>
  <!-- Background circle/square for high-contrast on all tabs -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#1A2D42" />
  
  <!-- Icon centered -->
  <g transform="translate(39, 24)">
    <!-- Outer glass bottle body -->
    <rect x="0" y="25" width="50" height="60" rx="8" fill="none" stroke="url(#gold)" stroke-width="4.5" />
    <!-- Inner product liquid -->
    <path d="M 8 40 Q 25 35 42 40 L 42 75 Q 25 80 8 75 Z" fill="url(#gold)" opacity="0.2"/>
    <!-- Collar -->
    <rect x="15" y="15" width="20" height="10" rx="2" fill="url(#gold)" />
    <!-- Cap -->
    <rect x="10" y="0" width="30" height="15" rx="3" fill="none" stroke="url(#gold)" stroke-width="3" />
  </g>
</svg>
