<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Premium Golden Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#F3E5AB" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>
  
  <!-- Logo Icon: Stylized Glass Perfume Bottle -->
  <g transform="translate(10, 10)">
    <!-- Outer glass bottle body -->
    <rect x="15" y="30" width="50" height="60" rx="8" fill="none" stroke="url(#gold)" stroke-width="3.5" opacity="0.9"/>
    <!-- Inner product liquid/reflection line -->
    <path d="M 23 45 Q 40 40 57 45 L 57 80 Q 40 85 23 80 Z" fill="url(#gold)" opacity="0.15"/>
    <!-- Collar -->
    <rect x="30" y="20" width="20" height="10" rx="2" fill="url(#gold)" />
    <!-- Cap -->
    <rect x="25" y="5" width="30" height="15" rx="3" fill="none" stroke="url(#gold)" stroke-width="2.5" />
    <!-- Reflection/Shine line -->
    <line x1="25" y1="40" x2="25" y2="80" stroke="#FFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Typography: GLASEOX -->
  <text x="95" y="72" font-family="'Inter', 'Outfit', 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="4" fill="#1A2D42">
    GLASE<tspan fill="url(#gold)">OX</tspan>
  </text>
  
  <!-- Tagline: PREMIUM GLASS PACKAGING -->
  <text x="98" y="94" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="6" fill="#50657D" opacity="0.8">
    PREMIUM GLASS PACKAGING
  </text>
</svg>
